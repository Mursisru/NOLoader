[UnityMono]
target_assembly=NOLoader\core\NOLoader.Core.dll

; RDYTU.mini — mod load optimizer only (no engine/gpu/hud perf IL).
[RDYTU]
rdytu_mini=1
ring_log=0
physics_catch_unity=0
physics_catch_motor=0
exception_tracking=1
exception_tracking_subscribe=0
stage_poll_seconds=1.0

; NOModOptimizer — optimized one-time mod load path.
mod_optimizer=1
mod_tick_analyzer=1
mod_reflection_cache=1
mod_scene_locator=1
mod_collision_layers=0
mod_shader_warmup=1
mod_layer_projectile=27
mod_shader_warmup_budget_ms=50

; All gameplay perf hooks off (enforced again when rdytu_mini=1).
engine_tweaker=0
gpu_render=0
core_balancer=0
hud_marker_throttle=0

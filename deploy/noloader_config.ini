[UnityMono]
target_assembly=NOLoader\core\NOLoader.Core.dll

; RDYTU production — stable 60+ FPS target: CPU+GPU ground cull + adaptive grass/trees.
[RDYTU]
ring_log=0
physics_catch_unity=0
physics_catch_motor=0
exception_tracking=1
exception_tracking_subscribe=0
stage_poll_seconds=1.0
ring_flush_ms=8000

; NOEngineTweaker — compound ground cull + GPU renderer off + adaptive detail.
trackir_safe_mode=1
engine_tweaker=1
string_cache=0
hud_refresh_skip=0
culling_optimizer=0
culling_ground_wheels=1
culling_pilot_anim=0
culling_offscreen_only=1
culling_on_screen_max_m=400
culling_ground_renderer=1
fps_adaptive_detail=1
frame_cache=0
canvas_limiter=0
cull_distance_m=5000
display_detail_min=1.0
string_cache_max=2000

; CombatHUD marker throttle — round-robin WorldToScreenPoint budget per frame.
hud_marker_throttle=1
hud_markers_per_frame=12

; CoreBalancer — mod worker pool + optional affinity (default off)
core_balancer=0
mod_worker_count=0
mod_affinity_mask=auto
main_thread_affinity=0
double_buffer=1
mod_compute_budget_ms=2.0

; NOGpuRender — off in production (no DDOL host overhead).
gpu_render=0
gfx_native_jobs=1
gpu_metrics=0
gpu_hud_pass=0
gpu_fx_instancing=0

; World snapshot stride when mods activate ActivateWorld().
world_snapshot_stride=4

; NOModOptimizer — mod-only; off for base game unless mods opt in.
mod_optimizer=0
mod_tick_analyzer=1
mod_reflection_cache=1
mod_scene_locator=1
mod_collision_layers=0
mod_shader_warmup=1
mod_layer_projectile=27
mod_shader_warmup_budget_ms=50

[UnityMono]
target_assembly=NOLoader\core\NOLoader.Core.dll

; RDYTU performance profile (DEV.SDK ignores [RDYTU] — full diagnostics enabled)
[RDYTU]
ring_log=1
physics_catch_unity=0
physics_catch_motor=0
exception_tracking=1
exception_tracking_subscribe=0
stage_poll_seconds=1.0
ring_flush_ms=8000

; NOEngineTweaker — global game optimizations (RDYTU, build 23670157+)
engine_tweaker=1
string_cache=1
hud_refresh_skip=0
culling_optimizer=0
frame_cache=1
canvas_limiter=0
cull_distance_m=5000
display_detail_min=1.0
string_cache_max=2000

; CoreBalancer — mod worker pool + optional affinity (default off)
core_balancer=0
mod_worker_count=0
mod_affinity_mask=auto
main_thread_affinity=0
double_buffer=1
mod_compute_budget_ms=2.0

; NOGpuRender — client-side GPU offload (default off)
gpu_render=0
gfx_native_jobs=1
gpu_metrics=1
gpu_hud_pass=0
gpu_fx_instancing=0
; canvas_limiter (global key above) also applies when gpu_render=1 without engine_tweaker

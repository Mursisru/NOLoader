[UnityMono]
target_assembly=NOLoader\core\NOLoader.Core.dll

; RDYTU production profile — field diagnostics off by default (ring_log=1 adds lock overhead).
[RDYTU]
ring_log=0
physics_catch_unity=0
physics_catch_motor=0
exception_tracking=1
exception_tracking_subscribe=0
stage_poll_seconds=1.0
ring_flush_ms=8000

; NOEngineTweaker — RDYTU Cecil plan: string cache + frame cache only.
; hud_refresh_skip / culling_optimizer hooks exist in code but are NOT in RDYTU patch plan (gameplay regressions).
engine_tweaker=1
string_cache=1
hud_refresh_skip=0
culling_optimizer=0
frame_cache=1
canvas_limiter=0
cull_distance_m=5000
display_detail_min=1.0
string_cache_max=2000

; CoreBalancer — mod worker pool + optional affinity (default off)
core_balancer=0
mod_worker_count=0
mod_affinity_mask=auto
main_thread_affinity=0
double_buffer=1
mod_compute_budget_ms=2.0

; NOGpuRender — enable gpu_hud_pass / gpu_fx_instancing for GPU wins; gpu_render=1 alone adds idle hook overhead (DEV4O2 skips CommandBuffer when no GPU mods).
gpu_render=0
gfx_native_jobs=1
gpu_metrics=1
gpu_hud_pass=0
gpu_fx_instancing=0
; canvas_limiter (global key above) also applies when gpu_render=1 without engine_tweaker

; NOModOptimizer — mod-only; does not boost base game FPS. Off for production unless mods opt in.
mod_optimizer=0
mod_tick_analyzer=1
mod_reflection_cache=1
mod_scene_locator=1
mod_collision_layers=0
mod_shader_warmup=1
mod_layer_projectile=27
mod_shader_warmup_budget_ms=50
